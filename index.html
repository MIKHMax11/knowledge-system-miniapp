<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .card h2 { color: #00d4ff; font-size: 1.1em; margin-bottom: 12px; }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.97); }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
        }
        .stat-box {
            background: rgba(0,212,255,0.05);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }
        .stat-value { font-size: 1.5em; color: #00d4ff; font-weight: bold; }
        .stat-label { color: #a0a0a0; font-size: 0.65em; }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: #e0e0e0;
            margin-bottom: 8px;
        }
        .log {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 8px;
            font-family: monospace;
            font-size: 0.7em;
            color: #a0a0a0;
            max-height: 120px;
            overflow-y: auto;
        }
        .log .ok { color: #00ff96; }
        .log .err { color: #ff6b9d; }
        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65em;
        }
        .badge.studied { background: rgba(0,255,150,0.2); color: #00ff96; }
        .badge.pending { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .knowledge-item {
            padding: 8px;
            border-left: 3px solid rgba(0,212,255,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(0,255,150,0.1);
            border: 1px solid rgba(0,255,150,0.3);
            border-radius: 6px;
            color: #00ff96;
            font-size: 0.8em;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff96;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="text-align:center; color:#00d4ff;">🧠 Knowledge System</h1>
        <div class="status"><span class="status-dot"></span><span id="status-text">Подключение...</span></div>
    </div>

    <div class="card">
        <h2>📊 Статистика</h2>
        <div class="stats-grid">
            <div class="stat-box"><div class="stat-value" id="total">0</div><div class="stat-label">Всего</div></div>
            <div class="stat-box"><div class="stat-value" id="studied">0</div><div class="stat-label">Изучено</div></div>
            <div class="stat-box"><div class="stat-value" id="level">0%</div><div class="stat-label">Уровень</div></div>
            <div class="stat-box"><div class="stat-value" id="pending">0</div><div class="stat-label">В очереди</div></div>
        </div>
        <button class="btn" onclick="loadData()">🔄 Обновить</button>
    </div>

    <div class="card">
        <h2>📚 База знаний</h2>
        <div id="knowledge-list"><p style="color:#a0a0a0;">⏳ Загрузка...</p></div>
    </div>

    <div class="card">
        <h2>🤖 Ассистент</h2>
        <input type="text" id="question" placeholder="Введите вопрос..." onkeypress="if(event.key==='Enter') ask()">
        <button class="btn" onclick="ask()">❓ Спросить</button>
        <div id="answer" style="margin-top:8px; border-left:3px solid #00d4ff; padding:8px;"></div>
    </div>

    <div class="card">
        <h2>📋 Логи</h2>
        <div class="log" id="log">🔄 Ожидание...</div>
    </div>

    <script>
        // ========================================
        // Knowledge System - Telegram Mini App
        // БЕЗ ТОННЕЛЯ!
        // ========================================

        const tg = window.Telegram?.WebApp;
        const isTelegram = !!tg;

        function addLog(msg, type = '') {
            const log = document.getElementById('log');
            const cls = type === 'ok' ? 'ok' : type === 'err' ? 'err' : '';
            log.innerHTML += `<div class="${cls}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        if (isTelegram) {
            tg.ready();
            tg.expand();
            const user = tg.initDataUnsafe?.user || { first_name: 'Гость' };
            document.getElementById('status-text').textContent = `🟢 Подключено • ${user.first_name}`;
            addLog(`✅ Mini App инициализирован, пользователь: ${user.first_name}`, 'ok');
            
            // ✅ ПРАВИЛЬНОЕ СОБЫТИЕ ДЛЯ ПОЛУЧЕНИЯ ОТВЕТОВ
            tg.onEvent('web_app_data', function(event) {
                try {
                    const data = JSON.parse(event.data);
                    addLog(`📩 Получен ответ: ${data.action}`, 'ok');
                    handleResponse(data);
                } catch (e) {
                    addLog(`❌ Ошибка парсинга: ${e.message}`, 'err');
                }
            });
        } else {
            document.getElementById('status-text').textContent = '⚠️ Тестовый режим';
            addLog('⚠️ Запущено вне Telegram', 'err');
        }

        // ===== ОТПРАВКА В БОТ =====
        function sendToBot(action, data = {}) {
            if (!isTelegram) {
                addLog(`📨 [Mock] ${action}`, '');
                setTimeout(() => mockResponse(action), 300);
                return;
            }

            try {
                tg.sendData(JSON.stringify({ action, data }));
                addLog(`📨 Отправлено: ${action}`, '');
            } catch (e) {
                addLog(`❌ Ошибка: ${e.message}`, 'err');
            }
        }

        // ===== MOCK ДЛЯ ТЕСТА =====
        function mockResponse(action) {
            if (action === 'get_stats') {
                handleResponse({
                    action: 'stats',
                    data: { total_items: 742, studied: 497, level: 49.6, pending: 245 }
                });
            } else if (action === 'get_knowledge') {
                handleResponse({
                    action: 'knowledge_list',
                    data: {
                        items: [
                            { id: 1, title: 'Психология личности', category: 'psychology', is_studied: true },
                            { id: 2, title: 'Нейронные сети', category: 'ai', is_studied: false },
                            { id: 3, title: 'Основы Python', category: 'programming', is_studied: true }
                        ],
                        total: 3
                    }
                });
            } else if (action === 'ask') {
                handleResponse({
                    action: 'answer',
                    data: { answer: '🧠 Нейронные сети — это математические модели, вдохновлённые работой мозга.', sources: 3 }
                });
            }
        }

        // ===== ОБРАБОТКА ОТВЕТОВ =====
        function handleResponse(response) {
            switch(response.action) {
                case 'stats':
                    document.getElementById('total').textContent = response.data.total_items || 0;
                    document.getElementById('studied').textContent = response.data.studied || 0;
                    document.getElementById('level').textContent = Math.round(response.data.level || 0) + '%';
                    document.getElementById('pending').textContent = response.data.pending || 0;
                    addLog(`✅ Статистика обновлена: ${response.data.total_items} элементов`, 'ok');
                    break;
                    
                case 'knowledge_list':
                    const list = document.getElementById('knowledge-list');
                    list.innerHTML = '';
                    (response.data.items || []).forEach(item => {
                        const badge = item.is_studied ? 
                            '<span class="badge studied">✅ Изучено</span>' :
                            '<span class="badge pending">⏳ В очереди</span>';
                        list.innerHTML += `
                            <div class="knowledge-item">
                                <div><strong>${item.title}</strong><br><small>${item.category || 'general'}</small></div>
                                ${badge}
                            </div>
                        `;
                    });
                    addLog(`✅ Загружено знаний: ${(response.data.items || []).length}`, 'ok');
                    break;
                    
                case 'answer':
                    document.getElementById('answer').innerHTML = `<strong>🤖 Ответ:</strong><br>${response.data.answer || 'Нет ответа'}`;
                    addLog('✅ Ответ получен', 'ok');
                    break;
                    
                case 'error':
                    addLog(`❌ Ошибка: ${response.data?.message || 'Неизвестная'}`, 'err');
                    break;
                    
                default:
                    addLog(`📩 Неизвестный ответ: ${response.action}`, '');
            }
        }

        // ===== ФУНКЦИИ =====
        function loadData() {
            addLog('🔄 Загрузка данных...', '');
            sendToBot('get_stats');
            sendToBot('get_knowledge', { page: 1, limit: 20 });
        }

        function ask() {
            const q = document.getElementById('question').value.trim();
            if (!q) { addLog('⚠️ Введите вопрос', 'err'); return; }
            addLog(`❓ Вопрос: ${q}`);
            sendToBot('ask', { question: q });
        }

        // ===== АВТОЗАГРУЗКА =====
        setTimeout(() => {
            if (isTelegram) {
                addLog('🔄 Загрузка начальных данных...', '');
                loadData();
            }
        }, 500);

        addLog('✅ Mini App загружен', 'ok');
    </script>
</body>
</html>
